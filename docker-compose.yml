services:
  db:
    image: postgres:16-alpine
    container_name: emeeting-db
    environment:
      POSTGRES_DB: emeeting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1040
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./code/emeeting-backend/migrations/up:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d emeeting"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./code/emeeting-backend
    container_name: emeeting-backend
    environment:
      POSTGRES_DSN: postgres://postgres:1040@db:5432/emeeting?sslmode=disable
      SERVER_PORT: 8080
      CORS_ALLOW_ORIGIN: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/ws/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  speech-service:
    build:
      context: ./code/speech-service
    container_name: emeeting-speech-service
    profiles: ["ai"]
    environment:
      SPEECH_ASR_ENGINE: ${SPEECH_ASR_ENGINE:-whisper}
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-base}
      # ru = стабильнее для русской речи; auto = автоопределение faster-whisper
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-ru}
      # true = меньше «галлюцинаций» на тишине (VAD в faster-whisper); false если очень тихий микрофон
      WHISPER_VAD_FILTER: ${WHISPER_VAD_FILTER:-true}
      # false = меньше повторов при стриминге нарастающего буфера (см. whisper_real_time)
      WHISPER_CONDITION_ON_PREVIOUS_TEXT: ${WHISPER_CONDITION_ON_PREVIOUS_TEXT:-false}
    expose:
      - "8090"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ai-gateway:
    build:
      context: ./code/ai-gateway
    container_name: emeeting-ai-gateway
    profiles: ["ai"]
    environment:
      BACKEND_WS_BASE_URL: ws://backend:8080
      # 0 = multiplex `/ws/analysis` (any meeting id). Positive = legacy single-room `/ws/sessions/:id`.
      SESSION_ID: ${AI_GATEWAY_SESSION_ID:-0}
      AI_GATEWAY_EMAIL: demo1@example.com
      AI_GATEWAY_PASSWORD: demo1pass
      AI_GATEWAY_MODULES_CONFIG: /app/modules.docker.json
      # Incoming WS JSON (`audio` with base64 WebM) can exceed defaults; see ws_client.SessionWSClient.
      AI_GATEWAY_WS_MAX_MSG_BYTES: "${AI_GATEWAY_WS_MAX_MSG_BYTES:-54525952}"
      AI_GATEWAY_WS_PING_INTERVAL: "${AI_GATEWAY_WS_PING_INTERVAL:-25}"
      AI_GATEWAY_WS_PING_TIMEOUT: "${AI_GATEWAY_WS_PING_TIMEOUT:-300}"
      CUDA_VISIBLE_DEVICES: "-1"
      TF_CPP_MIN_LOG_LEVEL: "2"
    depends_on:
      backend:
        condition: service_healthy
      speech-service:
        condition: service_healthy

  ui:
    build:
      context: ./code/emeeting-ui
      args:
        VITE_API_URL: /api
        VITE_WS_URL: /ws
    container_name: emeeting-ui
    environment:
      VITE_API_URL: /api
      VITE_WS_URL: /ws
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
